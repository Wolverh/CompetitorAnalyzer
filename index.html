<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolver's Automation Hub</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.min.js"></script>
    <!-- Google Fonts: Inter & Orbitron for a futuristic feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Use Inter as the default font, Orbitron for special headings */
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Hide scrollbars from the animated background */
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* Animated Gradient Background */
        .animated-gradient {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #004e92);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Effect for the main container */
        .glass-container {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* For Safari */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Neon Glow Effect for the button */
        .neon-button {
            box-shadow: 0 0 5px #0ea5e9, 0 0 15px #0ea5e9, 0 0 25px #0ea5e9, 0 0 50px #0ea5e9;
        }

    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen">
    
    <!-- Animated background div -->
    <div class="animated-gradient"></div>

    <!-- Main container with glassmorphism -->
    <div class="text-center p-8 rounded-2xl shadow-2xl max-w-sm w-full glass-container">
        
        <!-- Header Section -->
        <div class="mb-6">
            <h1 class="text-3xl font-orbitron text-cyan-300 drop-shadow-[0_0_8px_rgba(103,232,249,0.5)]">WOLVER'S HUB</h1>
            <p id="subheading" class="text-gray-300 mt-2">Enter Pass-Key to Access System.</p>
        </div>

        <!-- Password Section -->
        <div id="passwordSection">
            <!-- Container for input and show/hide button -->
            <div class="relative w-full mb-4">
                <input type="password" id="passwordInput" placeholder="Pass-Key" class="w-full bg-gray-900/50 border border-gray-500 text-white rounded-lg p-3 pr-10 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all">
                <button id="togglePassword" type="button" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-cyan-300" aria-label="Toggle password visibility">
                    <svg id="eyeIcon" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <svg id="eyeOffIcon" class="h-5 w-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L6.228 6.228" />
                    </svg>
                </button>
            </div>
            <button id="unlockButton" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out">
                Authenticate
            </button>
            <div id="passwordError" class="mt-4 text-sm text-red-400 h-5">&nbsp;</div>
        </div>

        <!-- Trigger Section (Hidden by default) -->
        <div id="triggerSection" class="hidden">
            <p class="text-lg font-bold text-green-400 mb-2">You're now using Wolver's stuff.</p>
            <p class="text-sm text-gray-300 mb-6">Be grateful and happy.</p>

            <button id="runButton" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-sky-300 disabled:bg-gray-600 disabled:cursor-not-allowed neon-button">
                <span id="buttonText">INITIATE</span>
                <svg id="loadingSpinner" class="animate-spin h-5 w-5 text-white mx-auto hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>

            <div id="statusMessage" class="mt-6 text-sm h-5">&nbsp;</div>
        </div>
    </div>

    <script>
        // --- Element References ---
        const passwordSection = document.getElementById('passwordSection');
        const triggerSection = document.getElementById('triggerSection');
        const passwordInput = document.getElementById('passwordInput');
        const unlockButton = document.getElementById('unlockButton');
        const passwordError = document.getElementById('passwordError');
        const subheading = document.getElementById('subheading');
        const runButton = document.getElementById('runButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        // --- Sound Synthesis Setup (Tone.js) ---
        const synth = new Tone.Synth().toDestination();
        let audioStarted = false;
        function playErrorSound() { if(audioStarted) synth.triggerAttackRelease("C2", "8n"); }
        function playSuccessSound() {
            if(audioStarted) {
                synth.triggerAttackRelease("C4", "16n", Tone.now());
                synth.triggerAttackRelease("E4", "16n", Tone.now() + 0.1);
                synth.triggerAttackRelease("G4", "16n", Tone.now() + 0.2);
            }
        }
        function playClickSound() { if(audioStarted) synth.triggerAttackRelease("C5", "32n"); }
        function playFailureSound() {
            if(audioStarted) {
                synth.triggerAttackRelease("G2", "16n", Tone.now());
                synth.triggerAttackRelease("E2", "16n", Tone.now() + 0.1);
                synth.triggerAttackRelease("C2", "16n", Tone.now() + 0.2);
            }
        }

        // --- Configuration & Security ---
        const correctPasswordHash = 'Tm91cmE='; // "Noura" in Base64
        const webhookUrl = 'https://hook.eu2.make.com/hll3xsclyahdg9xxnckf1txz3p559dky';
        const payload = { "THEMAGICWORD": "run" };

        // --- Cookie Helper Functions ---
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // --- Password Logic ---
        async function checkPassword() {
            // FIX: Wrap audio start in a try/catch to prevent it from blocking the login
            if (!audioStarted) {
                try {
                    await Tone.start();
                    audioStarted = true;
                    console.log('Audio context started.');
                } catch (e) {
                    console.error("Could not start audio context:", e);
                    // The app can continue without audio if it fails
                }
            }

            const enteredPasswordHash = btoa(passwordInput.value);
            if (enteredPasswordHash === correctPasswordHash) {
                playSuccessSound();
                setCookie('wolverAuth', 'true', 7);
                passwordSection.classList.add('hidden');
                triggerSection.classList.remove('hidden');
                subheading.textContent = 'System Unlocked. Ready to Initiate.';
            } else {
                playErrorSound();
                passwordError.textContent = 'Authentication Failed. Invalid Pass-Key.';
                passwordInput.value = '';
                setTimeout(() => { passwordError.textContent = '\u00A0'; }, 3000);
            }
        }

        unlockButton.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });

        // NEW: Event listener for the show/hide password button
        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.classList.toggle('hidden', isPassword);
            eyeOffIcon.classList.toggle('hidden', !isPassword);
        });

        // --- Webhook Trigger Logic ---
        runButton.addEventListener('click', async () => {
            playClickSound();
            runButton.disabled = true;
            buttonText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            statusMessage.textContent = 'Transmitting...';
            statusMessage.className = 'mt-6 text-sm text-gray-400';

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    playSuccessSound();
                    statusMessage.textContent = 'Transmission Successful. Workflow Initiated.';
                    statusMessage.className = 'mt-6 text-sm text-green-400';
                } else {
                    playFailureSound();
                    statusMessage.textContent = `Transmission Error: ${response.status}`;
                    statusMessage.className = 'mt-6 text-sm text-red-400';
                }
            } catch (error) {
                playFailureSound();
                console.error('An error occurred during the fetch operation:', error);
                statusMessage.textContent = 'Network Failure. Check Console.';
                statusMessage.className = 'mt-6 text-sm text-red-400';
            } finally {
                setTimeout(() => {
                    runButton.disabled = false;
                    buttonText.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                }, 2000);
            }
        });

        // --- Page Load Logic (Check for Cookie) ---
        window.onload = function() {
            if (getCookie('wolverAuth') === 'true') {
                console.log('User is already authenticated via cookie.');
                passwordSection.classList.add('hidden');
                triggerSection.classList.remove('hidden');
                subheading.textContent = 'System Unlocked. Welcome Back.';
            } else {
                console.log('User not authenticated. Showing password screen.');
            }
        };
    </script>

</body>
</html>
