<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tone.js (sound synthesis) -->
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.39/build/Tone.js"></script>

    <title>WOLVER'S HUB</title>

    <style>
        /* animated gradient background */
        @keyframes gradient {
            0%   {background-position: 0% 50%}
            50%  {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }
        body {
            background: linear-gradient(-45deg,#0a0027,#15003c,#000c3d,#2f0078);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Inter', sans-serif;
        }
        h1 {font-family:'Orbitron',sans-serif;}

        /* glass panel */
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
        }

        /* neon button */
        .neon-btn {
            position:relative;
            display:inline-block;
            padding:0.75rem 2rem;
            border-radius:0.5rem;
            font-weight:600;
            letter-spacing:0.05em;
            background:#7f5cff1a;
            border:1px solid #7f5cff;
            transition: all .3s;
        }
        .neon-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .neon-btn:not(:disabled):hover {
            transform:translateY(-2px);
        }
        .neon-btn::before {
            content:'';
            position:absolute;
            inset:0;
            border-radius:inherit;
            box-shadow:0 0 8px #7f5cff,0 0 16px #7f5cff,0 0 24px #7f5cff;
            opacity:.6;
            z-index:-1;
            transition:opacity .3s;
        }
        .neon-btn:not(:disabled):hover::before {
            opacity:1;
        }
        
        /* New class for form inputs to match the style */
        .form-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            width: 100%;
            color: white;
        }
        .form-input:focus {
            outline: none;
            border-color: #7f5cff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white p-4">

    <!-- LOGIN PANEL (Unchanged) -->
    <div id="loginScreen" class="glass p-8 rounded-xl w-full max-w-md">
        <h1 class="text-3xl mb-6 text-center">WOLVER'S HUB</h1>

        <label class="block mb-2" for="pw">Enter Password</label>
        <div class="relative mb-6">
            <input id="pw" type="password" autocomplete="current-password"
                   class="w-full bg-transparent border border-white/30 rounded px-4 py-2 pr-10 focus:outline-none text-white">
            <button id="togglePw" type="button"
                    class="absolute inset-y-0 right-0 px-3 flex items-center select-none" tabindex="-1">
                <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/>
                    <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
                </svg>
                <svg id="eyeClosed" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M1 1l22 22-1.5 1.5L17.9 19C16 20.3 14 21 12 21c-7 0-10-7-10-7a17.7 17.7 0 013.6-4.6L2.5 2.5 1 1zm5.1 5.1A9.9 9.9 0 002 12s3 7 10 7c1.5 0 2.9-.4 4.2-1L12.7 14A5 5 0 017 9.3l-.9-3.2zM12 5c7 0 10 7 10 7-.3.7-.7 1.4-1.1 2l-1.5-1.5A10 10 0 0021 12s-3-7-10-7c-1 0-1.9.2-2.8.4L6.8 3.9A11.8 11.8 0 0112 5z"/>
                </svg>
            </button>
        </div>

        <button id="loginBtn" class="neon-btn w-full">Unlock</button>
    </div>

    <!-- MAIN PANEL (Modified) -->
    <div id="mainScreen" class="glass p-8 rounded-xl w-full max-w-lg hidden">
        <h1 class="text-3xl mb-6 text-center">WOLVER'S HUB</h1>
        
        <!-- New Form Inputs -->
        <div class="space-y-4 mb-6">
            <div>
                <label for="username" class="block mb-1 text-sm font-medium">Competitor TikTok Username</label>
                <input type="text" id="username" class="form-input" placeholder="e.g., islamabuauf">
            </div>
            <div>
                <label for="videoCount" class="block mb-1 text-sm font-medium">Number of Videos</label>
                <input type="number" id="videoCount" class="form-input" placeholder="e.g., 60" value="60">
            </div>
            <div>
                <label for="sheetId" class="block mb-1 text-sm font-medium">Google Sheet ID</label>
                <input type="text" id="sheetId" class="form-input" placeholder="Enter the ID from your sheet's URL">
            </div>
        </div>

        <button id="initBtn" class="neon-btn w-full">INITIATE ANALYSIS</button>
        
        <!-- Status and Result Area -->
        <div id="status-container" class="mt-4 text-center text-sm opacity-90 min-h-[60px]">
            <p id="status"></p>
            <div id="result" class="mt-2 font-semibold"></div>
        </div>
    </div>

    <script>
        (function(){
            /* ---------- BASIC HELPERS (Unchanged) ---------- */
            const STORED_B64 = "Tm91cmE="; // "Noura" in Base64
            const COOKIE = "wolverAuth";

            function setCookie(name, value, days){
                const d = new Date();
                d.setTime(d.getTime() + days*24*60*60*1000);
                document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/; SameSite=Strict; secure`;
            }
            function getCookie(name){
                return document.cookie.split(';').map(c=>c.trim())
                    .find(c=>c.startsWith(name+'='))?.split('=')[1];
            }

            /* ---------- DOM NODES (Updated for new inputs) ---------- */
            const loginScreen = document.getElementById('loginScreen');
            const mainScreen  = document.getElementById('mainScreen');
            const pwInput     = document.getElementById('pw');
            const loginBtn    = document.getElementById('loginBtn');
            const togglePw    = document.getElementById('togglePw');
            const eyeOpen     = document.getElementById('eyeOpen');
            const eyeClosed   = document.getElementById('eyeClosed');
            
            // New DOM nodes for the main panel
            const usernameInput = document.getElementById('username');
            const videoCountInput = document.getElementById('videoCount');
            const sheetIdInput = document.getElementById('sheetId');
            const initBtn     = document.getElementById('initBtn');
            const statusEl    = document.getElementById('status');
            const resultEl    = document.getElementById('result');

            /* ---------- AUDIO (Unchanged) ---------- */
            let audioReady = false;
            let synth, errSynth, clickSynth, failSynth;

            function initAudio(){
                if(audioReady) return;
                try{
                    synth      = new Tone.Synth().toDestination();
                    errSynth   = new Tone.Synth({oscillator:{type:"square"}}).toDestination();
                    clickSynth = new Tone.Synth({oscillator:{type:"triangle"}, envelope:{decay:0.05, release:0.1}}).toDestination();
                    failSynth  = new Tone.Synth({oscillator:{type:"sawtooth"}}).toDestination();
                    audioReady = true;
                }catch(e){
                    audioReady = false;
                }
            }
            function play(fn){ if(audioReady) { Tone.start().then(fn); } }
            function chime(){ play(()=>['C5','E5','G5','C6'].forEach((n,i)=>synth.triggerAttackRelease(n,0.15,"+"+i*0.15))); }
            function errorBuzz(){ play(()=>errSynth.triggerAttackRelease("C2",0.2)); }
            function clickSound(){ play(()=>clickSynth.triggerAttackRelease("C6",0.05)); }
            function failTone(){ play(()=>['C4','G3','E3','C3'].forEach((n,i)=>failSynth.triggerAttackRelease(n,0.2,"+"+i*0.15))); }

            /* ---------- VIEW SWITCH & LOGIN (Unchanged) ---------- */
            function showMain(){
                loginScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex', 'flex-col'); // Ensure proper layout
            }
            if(getCookie(COOKIE)==='1'){ showMain(); }

            togglePw.addEventListener('click', ()=>{
                const showing = pwInput.type === 'text';
                pwInput.type  = showing ? 'password' : 'text';
                eyeOpen.style.display   = showing ? 'block' : 'none';
                eyeClosed.style.display = showing ? 'none'  : 'block';
            });

            loginBtn.addEventListener('click', ()=>{
                initAudio();
                if(btoa(pwInput.value) === STORED_B64){
                    chime();
                    setCookie(COOKIE,'1',7);
                    showMain();
                }else{
                    errorBuzz();
                }
            });

            /* ---------- NEW: LOCAL STORAGE FOR INPUTS ---------- */
            function saveInputs() {
                localStorage.setItem('wolver_username', usernameInput.value);
                localStorage.setItem('wolver_videoCount', videoCountInput.value);
                localStorage.setItem('wolver_sheetId', sheetIdInput.value);
            }

            function loadInputs() {
                usernameInput.value = localStorage.getItem('wolver_username') || '';
                videoCountInput.value = localStorage.getItem('wolver_videoCount') || '60';
                sheetIdInput.value = localStorage.getItem('wolver_sheetId') || '';
            }
            
            // Load inputs when the main screen is shown
            if (getCookie(COOKIE) === '1') {
                loadInputs();
            }

            /* ---------- MODIFIED: WEBHOOK & CALLBACK LOGIC ---------- */
            let eventSource = null; // To hold the listener connection

            initBtn.addEventListener('click', async () => {
                const makeWebhookUrl = 'https://hook.eu2.make.com/hll3xsclyahdg9xxnckf1txz3p559dky';
                
                initAudio();
                clickSound();
                
                // 1. Clear previous results and disable the button
                statusEl.textContent = '';
                resultEl.innerHTML = '';
                initBtn.disabled = true;

                // 2. Validate user inputs
                const payload = {
                    username: usernameInput.value.trim(),
                    videoCount: parseInt(videoCountInput.value.trim(), 10),
                    sheetId: sheetIdInput.value.trim(),
                };

                if (!payload.username || !payload.videoCount || !payload.sheetId) {
                    errorBuzz();
                    statusEl.textContent = 'All fields are required.';
                    initBtn.disabled = false;
                    return;
                }
                saveInputs();

                try {
                    // 3. Automatically create a new return URL from webhook.site via a more reliable CORS proxy
                    statusEl.textContent = 'Generating secure return channel...';
                    
                    // Using a different, simple CORS proxy: allorigins.win
                    const proxyUrl = 'https://api.allorigins.win/raw?url=';
                    const targetUrl = encodeURIComponent('https://webhook.site/token');
                    
                    const tokenResponse = await fetch(proxyUrl + targetUrl, { 
                        method: 'POST'
                    });

                    if (!tokenResponse.ok) throw new Error('Could not create return channel.');
                    const tokenData = await tokenResponse.json();
                    const returnUrl = `https://webhook.site/${tokenData.uuid}`;

                    // 4. Listen for the result from the Make.com automation
                    statusEl.textContent = 'Listening for result...';
                    
                    // Also use the proxy for the EventSource connection
                    const streamTargetUrl = encodeURIComponent(`https://webhook.site/token/${tokenData.uuid}/stream`);
                    const streamUrl = `${proxyUrl}${streamTargetUrl}`;
                    eventSource = new EventSource(streamUrl);
                    
                    eventSource.onmessage = (event) => {
                        // The stream might send empty "ping" messages, so we check for actual data
                        if (!event.data) return;
                        
                        try {
                            const eventData = JSON.parse(event.data);
                            // We only care about the POST request from our Make.com automation
                            if(eventData.method === 'POST') {
                                const resultPayload = JSON.parse(eventData.content);
                                if(resultPayload.docUrl) {
                                    chime();
                                    statusEl.textContent = 'Success! Analysis complete.';
                                    resultEl.innerHTML = `<a href="${resultPayload.docUrl}" target="_blank" class="text-blue-400 hover:underline">View Generated Google Doc</a>`;
                                    eventSource.close(); // Stop listening
                                    initBtn.disabled = false;
                                }
                            }
                        } catch (e) {
                            console.error("Error parsing incoming message:", e);
                            // Ignore non-JSON messages which can sometimes occur with proxies
                        }
                    };

                    eventSource.onerror = (err) => {
                        failTone();
                        console.error("EventSource failed:", err);
                        statusEl.textContent = 'Connection to listener failed. Please try again.';
                        eventSource.close();
                        initBtn.disabled = false;
                    };

                    // 5. Send the request to your Make.com automation
                    statusEl.textContent = 'Sending request to automation... This may take a few minutes.';
                    const finalPayload = { ...payload, returnUrl: returnUrl };
                    
                    const makeResponse = await fetch(makeWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(finalPayload)
                    });

                    if (!makeResponse.ok) {
                        throw new Error('Failed to send request to the automation.');
                    }
                    
                    // The UI now just waits for the listener to fire.

                } catch (error) {
                    failTone();
                    statusEl.textContent = `An error occurred: ${error.message}`;
                    if(eventSource) eventSource.close();
                    initBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
