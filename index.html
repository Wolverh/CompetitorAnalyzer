<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make.com Automation Trigger</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Use Inter as the default font */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <!-- Main container for the trigger button and status messages -->
    <div class="text-center p-8 bg-gray-800 rounded-xl shadow-2xl border border-gray-700 max-w-sm w-full">
        
        <!-- Header Section -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-cyan-400">Automation Trigger</h1>
            <p class="text-gray-400 mt-2">Click the button to run the Make.com workflow.</p>
        </div>

        <!-- The Button -->
        <button id="runButton" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-cyan-300 disabled:bg-gray-600 disabled:cursor-not-allowed">
            <span id="buttonText">Send "run"</span>
            <!-- Loading spinner, hidden by default -->
            <svg id="loadingSpinner" class="animate-spin h-5 w-5 text-white mx-auto hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </button>

        <!-- Status Message Area -->
        <div id="statusMessage" class="mt-6 text-sm h-5">&nbsp;</div>

    </div>

    <script>
        // --- Element References ---
        const runButton = document.getElementById('runButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');

        // --- Configuration ---
        // The webhook URL provided by the user
        const webhookUrl = 'https://hook.eu2.make.com/hll3xsclyahdg9xxnckf1txz3p559dky';
        
        // The payload to be sent to the webhook
        const payload = {
            "THEMAGICWORD": "run"
        };

        // --- Event Listener ---
        runButton.addEventListener('click', async () => {
            // --- UI State: Loading ---
            // Disable the button to prevent multiple clicks
            runButton.disabled = true; 
            // Hide the button text and show the spinner
            buttonText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            // Reset status message
            statusMessage.textContent = 'Sending...';
            statusMessage.className = 'mt-6 text-sm text-gray-400';

            try {
                // --- The Fetch Request ---
                // We use a try...catch block to handle network errors
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        // We don't need Content-Type for Make.com webhooks with a simple body,
                        // but it's good practice for other APIs. Make.com will parse it correctly.
                        'Content-Type': 'application/json'
                    },
                    // Convert the JavaScript object to a JSON string
                    body: JSON.stringify(payload) 
                });

                // --- Handle the Response ---
                // Make.com webhooks typically respond with "Accepted" and a 200 status code on success.
                if (response.ok) {
                    console.log('Successfully triggered the webhook.');
                    statusMessage.textContent = 'Success! Workflow triggered.';
                    statusMessage.className = 'mt-6 text-sm text-green-400';
                } else {
                    // If the response is not ok, handle the error
                    console.error('Webhook trigger failed.', response);
                    statusMessage.textContent = `Error: ${response.status} ${response.statusText}`;
                    statusMessage.className = 'mt-6 text-sm text-red-400';
                }

            } catch (error) {
                // This catches network errors (e.g., no internet connection)
                console.error('An error occurred during the fetch operation:', error);
                statusMessage.textContent = 'Network error. Check console.';
                statusMessage.className = 'mt-6 text-sm text-red-400';
            } finally {
                // --- UI State: Reset ---
                // This 'finally' block runs whether the request succeeded or failed
                // Re-enable the button after a short delay to show the status message
                setTimeout(() => {
                    runButton.disabled = false;
                    buttonText.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                }, 2000); // 2-second delay
            }
        });
    </script>

</body>
</html>
